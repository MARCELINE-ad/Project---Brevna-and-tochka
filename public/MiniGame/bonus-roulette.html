<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Колесо Призов — Брёвна и Точка</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #1c5220;
      --green-mid:   #225926;
      --green-light: #286b2d;
      --bg:          #f5f5f5;
      --surface:     #ffffff;
      --surface2:    #f0f0f0;
      --border:      #e0e0e0;
      --text:        #1a1a1a;
      --text-mid:    #444444;
      --text-dim:    #888888;
      --outer:       #163d19;
    }

    html, body {
      min-height: 100%;
      background: var(--outer);
      color: var(--text);
      font-family: 'Oswald', 'Nunito', sans-serif;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.4rem 1rem 3rem;
    }

    /* ── Навигация ── */
    .topnav {
      width: 100%;
      max-width: 900px;
      display: flex;
      align-items: center;
      margin-bottom: 1.6rem;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--green);
      background: linear-gradient(180deg, #4A90D9 0%, #2C5F8A 100%);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Oswald', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.12em;
      padding: 9px 20px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 0 #1a3a58, 0 6px 14px rgba(0,0,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      text-transform: uppercase;
    }
    .back-btn:hover { background: linear-gradient(180deg, #5ba3f0 0%, #3a6fa0 100%); }
    .back-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #1a3a58;
    }
    .back-btn svg { flex-shrink: 0; }

    /* ── Баланс ── */
    .balance-card {
      display: flex;
      align-items: center;
      gap: 20px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-left: 3px solid var(--green);
      border-radius: 10px;
      padding: 13px 26px;
      margin-bottom: 2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .balance-label {
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      margin-bottom: 1px;
    }

    .balance-value {
      font-family: 'Oswald', sans-serif;
      font-size: 2.2rem;
      color: var(--green);
      letter-spacing: 0.1em;
      line-height: 1;
    }

    .balance-unit {
      font-family: 'Nunito', sans-serif;
      font-size: 0.68rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 700;
    }

    .balance-divider {
      width: 1px;
      height: 40px;
      background: var(--border);
    }

    /* ── Колесо ── */
    .wheel-section {
      display: flex;
      align-items: center;
      gap: 3rem;
      width: 100%;
      max-width: 900px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .wheel-wrap {
      position: relative;
      width: 380px;
      height: 380px;
      flex-shrink: 0;
    }

    .wheel-rim {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: repeating-conic-gradient(
        #d8e8d8 0deg 10deg,
        #c8dcc8 10deg 20deg
      );
      box-shadow: 0 0 0 2px #b8ccb8, 0 4px 20px rgba(0,0,0,0.15);
    }

    #wheel-canvas {
      position: relative;
      z-index: 2;
      width: 380px;
      height: 380px;
      border-radius: 50%;
      display: block;
    }

    .pointer {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      filter: drop-shadow(0 2px 6px rgba(245,166,35,0.7));
    }

    .spin-btn-wrap {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 30;
    }

    .spin-btn {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--green-mid), var(--outer));
      border: 4px solid #fff;
      outline: 2.5px solid var(--green);
      outline-offset: 2px;
      box-shadow: 0 4px 20px rgba(22,61,25,0.45), 0 1px 0 rgba(255,255,255,0.3) inset;
      cursor: pointer;
      font-family: 'Oswald', sans-serif;
      font-size: 1.05rem;
      letter-spacing: 0.14em;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
      transition: transform 0.12s, box-shadow 0.12s;
      position: relative;
      overflow: hidden;
    }

    .spin-btn::before {
      content: '';
      position: absolute;
      top: 10px; left: 16px;
      width: 26px; height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transform: rotate(-30deg);
    }

    .spin-btn:hover:not(:disabled) {
      transform: scale(1.07);
      box-shadow: 0 6px 28px rgba(22,61,25,0.55), 0 1px 0 rgba(255,255,255,0.3) inset;
    }

    .spin-btn:active:not(:disabled) { transform: scale(0.96); }
    .spin-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Боковая панель ── */
    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      min-width: 210px;
      max-width: 260px;
    }

    .prizes-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .prize-item {
      display: flex;
      align-items: center;
      gap: 9px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.79rem;
      color: var(--text-mid);
      font-weight: 700;
      padding: 7px 11px;
      border-radius: 7px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      transition: border-color 0.2s, background 0.2s;
    }

    .prize-item.highlight {
      border-color: var(--green);
      background: var(--surface2);
      color: var(--text);
    }

    .prize-icon { font-size: 1rem; }

    .prize-chance {
      margin-left: auto;
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      color: var(--text-dim);
    }

    /* ── История ── */
    .history-section {
      margin-top: 2.2rem;
      width: 100%;
      max-width: 680px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 7px;
      padding: 8px 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.78rem;
      color: var(--text-mid);
      animation: fadeIn 0.35s ease;
    }

    .history-item .h-icon { font-size: 1rem; }
    .history-item .h-prize { flex: 1; color: var(--text); font-weight: 700; }
    .history-item .h-code {
      font-family: 'Oswald', sans-serif;
      font-size: 0.9rem;
      color: var(--green);
      letter-spacing: 0.1em;
    }
    .history-item .h-time { font-size: 0.68rem; color: var(--text-dim); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Модалка ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .modal-overlay.active { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 2px solid var(--green);
      border-radius: 14px;
      padding: 2.2rem 2.4rem 1.8rem;
      width: 360px;
      max-width: 94vw;
      text-align: center;
      box-shadow: 0 8px 48px rgba(22,61,25,0.25), 0 2px 0 rgba(255,255,255,0.8) inset;
      transform: scale(0.86) translateY(16px);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
      overflow: hidden;
    }

    .modal::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
    }

    .modal-overlay.active .modal { transform: scale(1) translateY(0); }

    .modal-big-icon { font-size: 3rem; margin-bottom: 0.4rem; display: block; }

    .modal-heading {
      font-family: 'Oswald', sans-serif;
      font-size: 2rem;
      color: var(--green);
      letter-spacing: 0.14em;
      margin-bottom: 0.3rem;
    }

    .modal-prize-name {
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 1.2rem;
      line-height: 1.4;
    }

    .promo-block {
      background: var(--surface2);
      border: 1.5px dashed var(--green);
      border-radius: 8px;
      padding: 12px 18px;
      margin-bottom: 1.4rem;
    }

    .promo-label {
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 5px;
    }

    .promo-code-val {
      font-family: 'Oswald', sans-serif;
      font-size: 2rem;
      color: var(--green);
      letter-spacing: 0.22em;
    }

    .promo-sub { font-size: 0.7rem; color: var(--text-dim); margin-top: 4px; font-weight: 600; }

    .modal-close-btn {
      background: linear-gradient(135deg, var(--green-mid), var(--outer));
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Oswald', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.14em;
      padding: 12px 44px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(22,61,25,0.35);
      transition: opacity 0.15s, transform 0.1s;
    }

    .modal-close-btn:hover { opacity: 0.9; transform: scale(1.04); }
    .modal-empty-note { font-size: 0.78rem; color: var(--text-dim); margin-top: 0.8rem; font-weight: 600; }

    /* ── Адаптив ── */
    @media (max-width: 640px) {
      .wheel-wrap { width: 300px; height: 300px; }
      #wheel-canvas { width: 300px; height: 300px; }
      .spin-btn { width: 82px; height: 82px; font-size: 0.9rem; }
      .side-panel { max-width: 100%; min-width: 0; width: 100%; }
      .wheel-section { gap: 1.5rem; }
      .balance-card { padding: 11px 16px; gap: 12px; }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- ── Кнопка назад ── -->
  <nav class="topnav">
    <a class="back-btn" href="/" onclick="history.back();">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      🏠 На сайт
    </a>
  </nav>

  <!-- ── Баланс ── -->
  <div class="balance-card">
    <div>
      <div class="balance-label">Ваши баллы</div>
      <div class="balance-value" id="balance-display">500</div>
      <div class="balance-unit">бонусных баллов</div>
    </div>
    <div class="balance-divider"></div>
    <div>
      <div class="balance-label">Стоимость вращения</div>
      <div class="balance-value">100</div>
      <div class="balance-unit">баллов / раз</div>
    </div>
  </div>

  <!-- ── Колесо + боковая панель ── -->
  <div class="wheel-section">

    <div class="wheel-wrap">
      <div class="wheel-rim"></div>

      <svg class="pointer" width="28" height="34" viewBox="0 0 28 34">
        <polygon points="14,34 28,0 14,8 0,0" fill="#f5a623"/>
        <polygon points="14,30 22,4 14,11 6,4" fill="#ffd166" opacity="0.8"/>
      </svg>

      <canvas id="wheel-canvas" width="380" height="380"></canvas>

      <div class="spin-btn-wrap">
        <button class="spin-btn" id="spin-btn">КРУТИТЬ</button>
      </div>
    </div>

    <!-- Список призов -->
    <div class="side-panel">
      <ul class="prizes-list" id="prizes-list"></ul>
    </div>

  </div>

  <!-- ── История ── -->
  <div class="history-section">
    <div class="history-list" id="history-list">
      <div style="font-size:0.78rem; color: var(--text-dim); padding: 8px 0; font-family:'Nunito',sans-serif; font-weight:700;">Пока нет вращений</div>
    </div>
  </div>

</div>

<!-- ── Модалка ── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <span class="modal-big-icon" id="modal-icon">🏆</span>
    <div class="modal-heading">Ваш приз!</div>
    <div class="modal-prize-name" id="modal-prize-text">Бесплатная доставка</div>

    <div class="promo-block" id="promo-block">
      <div class="promo-label">Промокод применён к вашей корзине</div>
      <div class="promo-code-val" id="promo-code-val">BT-XXXXXX</div>
      <div class="promo-sub">Действует 7 дней с момента получения</div>
    </div>

    <button class="modal-close-btn" id="modal-close-btn">Забрать приз</button>
    <div class="modal-empty-note" id="modal-empty-note"></div>
  </div>
</div>


<script>
  const SECTORS = [
    { label: "Бесплатная доставка",      short: "Бесп. доставка",     icon: "🚚", weight:  8, empty: false },
    { label: "5 пар рабочих перчаток",   short: "5 пар перчаток",     icon: "🧤", weight: 10, empty: false },
    { label: "Скидка 5% на сухие смеси", short: "Скидка 5%",          icon: "💰", weight: 15, empty: false },
    { label: "1000 бонусных баллов",     short: "1000 баллов",        icon: "⭐", weight: 12, empty: false },
    { label: "Скидка 3% на весь чек",    short: "Скидка 3% на чек",   icon: "🏷️", weight: 22, empty: false },
    { label: "Бесплатный подъём на этаж",short: "Подъём на этаж",     icon: "🏗️", weight: 13, empty: false },
    { label: "Рулетка в подарок",        short: "Рулетка (подарок)",  icon: "📏", weight:  8, empty: false },
    { label: "Попробуй завтра",          short: "Попробуй завтра",    icon: "🔄", weight: 12, empty: true  },
  ];

  const SPIN_COST  = 100;
  let balance      = parseInt(localStorage.getItem('brevna_bonus') || '500');
  let spinning     = false;
  let currentAngle = 0;
  let spinCount    = 0;

  function saveBalance() {
    localStorage.setItem('brevna_bonus', balance);
    balanceDisplay.textContent = balance;
  }

  const canvas         = document.getElementById('wheel-canvas');
  const ctx            = canvas.getContext('2d');
  const spinBtn        = document.getElementById('spin-btn');
  const balanceDisplay = document.getElementById('balance-display');
  balanceDisplay.textContent = balance;
  const overlay        = document.getElementById('modal-overlay');
  const modalPrize     = document.getElementById('modal-prize-text');
  const modalIcon      = document.getElementById('modal-icon');
  const promoBlock     = document.getElementById('promo-block');
  const promoCodeVal   = document.getElementById('promo-code-val');
  const modalEmptyNote = document.getElementById('modal-empty-note');
  const modalCloseBtn  = document.getElementById('modal-close-btn');
  const prizesList     = document.getElementById('prizes-list');
  const historyList    = document.getElementById('history-list');

  const TOTAL_WEIGHT = SECTORS.reduce((s, x) => s + x.weight, 0);
  const SLICE        = (2 * Math.PI) / SECTORS.length;

  const COLORS = [
    { bg: '#ffffff', text: '#1c5220' },
    { bg: '#eef6ee', text: '#163d19' },
    { bg: '#ffffff', text: '#1c5220' },
    { bg: '#eef6ee', text: '#163d19' },
    { bg: '#ffffff', text: '#1c5220' },
    { bg: '#eef6ee', text: '#163d19' },
    { bg: '#ffffff', text: '#1c5220' },
    { bg: '#eef6ee', text: '#163d19' },
  ];

  function drawWheel(angle) {
    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H / 2;
    const r  = cx - 4;

    ctx.clearRect(0, 0, W, H);

    for (let i = 0; i < SECTORS.length; i++) {
      const start = angle + i * SLICE;
      const end   = start + SLICE;
      const mid   = start + SLICE / 2;
      const { bg, text } = COLORS[i];

      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, start, end);
      ctx.closePath();
      ctx.fillStyle = bg;
      ctx.fill();

      ctx.strokeStyle = '#b8d0b8';
      ctx.lineWidth   = 1;
      ctx.stroke();

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(mid);
      ctx.textAlign = 'right';

      ctx.font = '19px serif';
      ctx.fillText(SECTORS[i].icon, r - 12, 7);

      const words = SECTORS[i].short.split(' ');
      let lines = [], cur = '';
      for (const w of words) {
        const test = cur ? cur + ' ' + w : w;
        if (test.length > 12 && cur) { lines.push(cur); cur = w; }
        else { cur = test; }
      }
      if (cur) lines.push(cur);
      lines = lines.slice(0, 2);

      ctx.fillStyle = text;
      ctx.font      = '800 11.5px Nunito, sans-serif';
      const lh      = 14;
      const top     = -((lines.length - 1) * lh) / 2;
      lines.forEach((line, li) => {
        ctx.fillText(line, r - 42, top + li * lh + 4);
      });

      ctx.restore();
    }

    // Центральный диск
    ctx.beginPath();
    ctx.arc(cx, cy, 52, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(cx-8, cy-8, 8, cx, cy, 52);
    grad.addColorStop(0, '#2a6e2f');
    grad.addColorStop(1, '#163d19');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth   = 2.5;
    ctx.stroke();

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 18px Oswald, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('БиТ', cx, cy);

    // Насечки по краю
    const notches = SECTORS.length * 3;
    for (let n = 0; n < notches; n++) {
      const a = angle + (n / notches) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * (r - 10), cy + Math.sin(a) * (r - 10));
      ctx.lineTo(cx + Math.cos(a) * (r + 1),  cy + Math.sin(a) * (r + 1));
      ctx.strokeStyle = 'rgba(22,61,25,0.4)';
      ctx.lineWidth   = 1;
      ctx.stroke();
    }
  }

  function weightedRandom() {
    let rand = Math.random() * TOTAL_WEIGHT;
    for (let i = 0; i < SECTORS.length; i++) {
      rand -= SECTORS[i].weight;
      if (rand <= 0) return i;
    }
    return SECTORS.length - 1;
  }

  function genPromo() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    return 'BT-' + Array.from({ length: 6 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
  }

  function spin() {
    if (spinning) return;
    if (balance < SPIN_COST) {
      spinBtn.textContent = 'МАЛ. БАЛЛОВ';
      setTimeout(() => { spinBtn.textContent = 'КРУТИТЬ'; }, 1500);
      return;
    }

    balance -= SPIN_COST;
    saveBalance();
    spinning = true;
    spinBtn.disabled = true;

    const winIdx          = weightedRandom();
    const sectorMid       = winIdx * SLICE + SLICE / 2;
    const pointerAngle    = -Math.PI / 2;
    const diff            = ((pointerAngle - sectorMid - currentAngle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
    const fullSpins       = (5 + Math.floor(Math.random() * 4)) * Math.PI * 2;
    const totalRotation   = fullSpins + diff;
    const startAngle      = currentAngle;
    const duration        = 4500;
    const startTime       = performance.now();

    function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

    function animate(now) {
      const t = Math.min((now - startTime) / duration, 1);
      currentAngle = startAngle + totalRotation * easeOut(t);
      drawWheel(currentAngle);
      if (t < 1) {
        requestAnimationFrame(animate);
      } else {
        currentAngle = (startAngle + totalRotation) % (Math.PI * 2);
        spinning = false;
        spinBtn.disabled = false;
        showResult(winIdx);
      }
    }

    requestAnimationFrame(animate);
  }

  function showResult(idx) {
    const s = SECTORS[idx];
    modalIcon.textContent      = s.icon;
    modalPrize.textContent     = s.label;
    modalEmptyNote.textContent = '';

    if (s.empty) {
      promoBlock.style.display   = 'none';
      modalPrize.textContent     = 'Увы — не повезло! Попробуйте ещё раз.';
      modalEmptyNote.textContent = 'Крутите снова!';
    } else {
      promoBlock.style.display = 'block';
      const code = genPromo();
      promoCodeVal.textContent = code;

      const pointsMatch = s.label.match(/(\d+)\s*(бонусных\s*)?баллов/i);
      if (pointsMatch) {
        const pts = parseInt(pointsMatch[1]);
        balance += pts;
        saveBalance();
        modalEmptyNote.textContent = '✅ +' + pts + ' баллов зачислено на счёт!';
      }

      addHistory(s, code);
    }

    overlay.classList.add('active');
  }

  function saveHistory(entries) {
    localStorage.setItem('brevna_history', JSON.stringify(entries));
  }

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem('brevna_history') || '[]'); }
    catch { return []; }
  }

  function renderHistoryItem(entry) {
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `
      <span class="h-icon">${entry.icon}</span>
      <span class="h-prize">${entry.short}</span>
      <span class="h-code">${entry.code}</span>
      <span class="h-time">${entry.time}</span>
    `;
    return item;
  }

  function addHistory(sector, code) {
    const entries = loadHistory();
    const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    entries.unshift({ icon: sector.icon, short: sector.short, code, time });
    if (entries.length > 5) entries.pop();
    saveHistory(entries);

    historyList.innerHTML = '';
    entries.forEach(e => historyList.appendChild(renderHistoryItem(e)));
    spinCount = entries.length;
  }

  function initHistory() {
    const entries = loadHistory();
    if (entries.length === 0) return;
    historyList.innerHTML = '';
    spinCount = entries.length;
    entries.forEach(e => historyList.appendChild(renderHistoryItem(e)));
  }

  function buildPrizeList() {
    prizesList.innerHTML = '';
    SECTORS.forEach((s, i) => {
      const li = document.createElement('li');
      li.className = 'prize-item' + (i < 2 ? ' highlight' : '');
      li.innerHTML = `
        <span class="prize-icon">${s.icon}</span>
        <span>${s.short}</span>
        <span class="prize-chance">${s.weight}%</span>
      `;
      prizesList.appendChild(li);
    });
  }

  modalCloseBtn.addEventListener('click', () => overlay.classList.remove('active'));
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('active'); });
  spinBtn.addEventListener('click', spin);

  buildPrizeList();
  initHistory();
  drawWheel(currentAngle);
</script>

</body>
</html>
